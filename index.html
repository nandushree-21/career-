<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Career Roadmap Generator</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="animated-bg">
    <!-- ================= HEADER ================= -->

    <header
      class="w-full px-4 py-4 flex items-center justify-between max-w-7xl mx-auto"
    >
      <img
        src="C:\Users\akshg\OneDrive\Desktop\DC website\CR.jpeg"
        alt="Career Roadmap Logo"
        class="h-12 w-auto mr-3"
      />

      <marquee>
        <h1 class="text-2xl font-bold text-white">
          "Navigate Your Career Journey with Confidence"
        </h1>
      </marquee>

      <div class="flex items-center gap-3">
        <button
          id="dark-toggle"
          class="glass p-2 rounded-full text-white hover:scale-110 transition"
        >
          <i data-lucide="moon"></i>
        </button>

        <button
          id="pdf-btn"
          class="glass px-4 py-2 rounded-xl text-white font-medium hover:scale-105 transition flex items-center gap-2"
        >
          <i data-lucide="download"></i>

          <span>Download PDF</span>
        </button>
        <button
          id="pdf-btn"
          class="glass px-4 py-2 rounded-xl text-white font-medium hover:scale-105 transition flex items-center gap-2"
        >
          <li><a href="doc.html">Documentation</a></li>
        </button>
      </div>
    </header>

    <!-- ================= MAIN ================= -->

    <main id="main-content" class="max-w-7xl mx-auto px-4 pb-12">
      <!-- HERO -->

      <section class="text-center py-12 fade-in">
        <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">
          <p class="slogan">Your Roadmap to a Successful Career</p>
        </h2>

        <p class="text-gray-300 text-lg mb-8 max-w-2xl mx-auto">
          Select a career path and receive a complete roadmap with skills,
          learning resources, timeline and recommendations.
        </p>

        <div class="glass inline-block p-1 rounded-xl">
          <select
            id="career-select"
            class="bg-transparent text-white px-6 py-3 rounded-xl text-lg outline-none cursor-pointer"
          >
            <option value="">Select a Career Path</option>

            <option value="ai-engineer">AI Engineer</option>

            <option value="data-scientist">Data Scientist</option>

            <option value="web-developer">Web Developer</option>

            <option value="android-developer">Android Developer</option>

            <option value="cybersecurity">Cybersecurity</option>

            <option value="cloud-engineer">Cloud Engineer</option>

            <option value="devops">DevOps Engineer</option>

            <option value="uiux-designer">UI/UX Designer</option>

            <option value="blockchain">Blockchain Developer</option>
          </select>
        </div>
      </section>

      <!-- ROADMAP OUTPUT -->

      <div id="roadmap-output" class="hidden space-y-8">
        <!-- AI Suggestion -->

        <section class="glass p-6 fade-in">
          <h3
            class="text-xl font-semibold text-white mb-3 flex items-center gap-2"
          >
            <i data-lucide="sparkles"></i>

            AI Career Suggestion
          </h3>

          <p id="ai-suggestion" class="text-gray-300 leading-relaxed"></p>
        </section>

        <!-- Timeline -->

        <section class="glass p-6">
          <h3
            class="text-xl font-semibold text-white mb-6 flex items-center gap-2"
          >
            <i data-lucide="map"></i>

            Learning Timeline
          </h3>

          <div id="timeline-container"></div>
        </section>

        <!-- Skills Chart -->

        <section class="glass p-6">
          <h3
            class="text-xl font-semibold text-white mb-4 flex items-center gap-2"
          >
            <i data-lucide="bar-chart-3"></i>

            Skills Overview
          </h3>

          <div class="max-w-lg mx-auto">
            <canvas id="skills-chart"></canvas>
          </div>
        </section>

        <!-- Badges -->

        <section class="glass p-6">
          <h3
            class="text-xl font-semibold text-white mb-4 flex items-center gap-2"
          >
            <i data-lucide="award"></i>

            Achievement Badges
          </h3>

          <div id="badges-container" class="flex flex-wrap gap-3"></div>
        </section>

        <!-- Resources -->

        <section class="glass p-6">
          <h3
            class="text-xl font-semibold text-white mb-4 flex items-center gap-2"
          >
            <i data-lucide="book-open"></i>

            Learning Resources
          </h3>

          <div id="resources-container" class="grid md:grid-cols-2 gap-3"></div>
        </section>
      </div>
    </main>

    <!-- Custom JavaScript -->
    <script src="roadmaps.js"></script>
    <script src="script.js"></script>
  </body>
</html>
